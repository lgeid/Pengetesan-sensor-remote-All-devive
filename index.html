<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Remote Detector - LG Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0d0d11;
    --panel: #16161c;
    --border: #3c101e;
    --accent: #a50034; /* LG Ruby Red */
    --accent-light: #e6004c;
    --accent2: #ff4444;
    --accent3: #00ff88; /* Green Screen Neon */
    --text: #f0e6e8;
    --dim: #6b5259;
    --glow: 0 0 20px rgba(165, 0, 52, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(165,0,52,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,255,136,0.02) 0%, transparent 60%);
  }

  header {
    width: 100%;
    max-width: 720px;
    text-align: center;
    padding: 20px 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--text);
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
    margin-bottom: 6px;
  }
  .logo span { color: var(--accent-light); }

  .sub {
    font-size: 0.78rem;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* === Main panel === */
  .panel {
    width: 100%;
    max-width: 720px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 10px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  /* === Camera view === */
  .cam-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 16px;
  }

  .viewfinder {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 4/3;
    background: #050508;
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #canvasEl {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: none;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0.4;
  }
  .placeholder svg { width: 60px; height: 60px; stroke: var(--accent-light); }
  .placeholder span { font-size: 0.75rem; color: var(--dim); }

  /* Corner decorations */
  .corner { position: absolute; width: 16px; height: 16px; border-color: var(--accent); border-style: solid; opacity: 0.8; }
  .corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  /* Scan line animation */
  .scanline {
    position: absolute;
    top: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
    opacity: 0;
    pointer-events: none;
  }
  .scanline.active { opacity: 0.6; animation: scan 2.5s linear infinite; }
  @keyframes scan { from { top: 0%; } to { top: 100%; } }

  /* Animasi Overlay Teks Life's Good */
  .lg-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(165, 0, 52, 0.15);
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 15px var(--accent-light), 0 0 30px #000;
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }

  .lg-overlay.active {
    animation: lifesGoodAnim 0.8s ease-out forwards;
  }

  @keyframes lifesGoodAnim {
    0% { opacity: 0; transform: scale(0.7) rotate(-3deg); filter: blur(5px); }
    15% { opacity: 1; transform: scale(1.05) rotate(0deg); filter: blur(0); }
    30% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent3)); }
    80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.1); filter: blur(3px); }
  }

  /* === Status & Controls === */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    padding: 10px 14px;
    background: #09090d;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.75rem;
  }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: all 0.2s; flex-shrink: 0; }
  .status-dot.live { background: var(--accent3); box-shadow: 0 0 10px var(--accent3); animation: pulse 1.5s infinite; }
  .status-dot.detect { background: var(--accent-light); box-shadow: 0 0 12px var(--accent-light); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  #statusText { color: var(--text); flex: 1; text-align: center; font-weight: bold; }

  /* Panel Kontrol */
  .control-panel {
    width: 100%;
    max-width: 480px;
    background: #09090d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .control-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; }
  .control-row label { flex: 1; cursor: pointer; color: var(--text); opacity: 0.9; }
  .slider-container { display: flex; align-items: center; flex: 2; gap: 10px; }
  
  input[type=range] {
    flex: 1;
    accent-color: var(--accent-light);
    cursor: pointer;
  }
  #sensVal { width: 35px; text-align: right; color: var(--accent-light); font-weight: bold; }

  .checkbox-container { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text); }
  input[type=checkbox] {
    appearance: none;
    width: 16px; height: 16px;
    border: 1px solid var(--accent);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    position: relative;
  }
  input[type=checkbox]:checked { border-color: var(--accent3); background: rgba(0,255,136,0.15); }
  input[type=checkbox]:checked::after {
    content: '✓'; position: absolute; top: -2px; left: 2px; font-size: 11px; color: var(--accent3); font-weight: bold;
  }

  /* === Buttons === */
  .btn-group { display: flex; gap: 12px; width: 100%; max-width: 480px; }
  .btn {
    flex: 1; padding: 12px 0;
    border: 1px solid var(--border);
    background: rgba(22,22,28,0.6);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); background: rgba(165,0,52,0.1); }
  
  .btn.primary { border-color: var(--accent); color: #fff; background: var(--accent); font-weight: bold; }
  .btn.primary:hover { background: var(--accent-light); box-shadow: var(--glow); }
  .btn:disabled { opacity: 0.2; cursor: not-allowed; border-color: var(--border) !important; background: transparent !important; color: var(--dim) !important; }

  /* === Meter === */
  .meter-section { border-top: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .meter-label { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; width: 80px; }
  .meter-bar { flex: 1; height: 6px; background: #09090d; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent3), var(--accent-light)); border-radius: 3px; transition: width 0.08s; }
  .meter-val { font-size: 0.75rem; color: var(--accent-light); width: 50px; text-align: right; font-weight: bold; }

  /* === Log === */
  .log-section { border-top: 1px solid var(--border); padding: 20px 24px; }
  .log-header { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .log-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #logList { list-style: none; display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
  
  .log-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #09090d; border: 1px solid var(--border); border-radius: 4px; font-size: 0.75rem; }
  .log-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-light); flex-shrink: 0; }
  .log-item .ts { color: var(--dim); font-size: 0.7rem; }
  .log-item .label { flex: 1; color: var(--text); }
  .log-item .strength { color: var(--accent3); font-weight: bold; }
  .empty-log { text-align: center; color: var(--dim); font-size: 0.75rem; padding: 20px; }

</style>
</head>
<body>

<header>
  <div class="logo">LG <span>IR MONITOR</span></div>
  <div class="sub">Life's Good — Infrared Signal Lab</div>
</header>

<div class="panel">
  <div class="cam-section">
    <div class="viewfinder" id="viewfinder">
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="canvasEl"></canvas>
      
      <div class="lg-overlay" id="lgOverlay">Life's Good</div>

      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round">
          <rect x="2" y="3" width="20" height="15" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>Sistem Monitor Offline</span>
      </div>

      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scanline" id="scanline"></div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Tekan MULAI untuk memindai</span>
      <span style="font-size:0.65rem;color:var(--dim)" id="fpsCounter"></span>
    </div>

    <div class="control-panel">
      <div class="control-row">
        <label for="sensSlider">Sensitivitas Lensa:</label>
        <div class="slider-container">
          <input type="range" id="sensSlider" min="1" max="100" value="65">
          <span id="sensVal">65%</span>
        </div>
      </div>
      <div class="control-row">
        <label class="checkbox-container">
          <input type="checkbox" id="greenToggle" checked>
          Mode Green Screen (Isolasi Piksel IR Ultra)
        </label>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn primary" id="btnStart" onclick="startCamera()">▶ MULAI</button>
      <button class="btn" id="btnStop" onclick="stopCamera()" disabled>■ BERHENTI</button>
      <button class="btn" id="btnClear" onclick="clearLog()">✕ RESET LOG</button>
    </div>
  </div>

  <div class="meter-section">
    <div class="meter-label">Sinyal Level</div>
    <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
    <div class="meter-val" id="meterVal">0%</div>
  </div>

  <div class="log-section">
    <div class="log-header">LOG AKTIVITAS REMOTE</div>
    <ul id="logList">
      <li class="empty-log" id="emptyLog">Menunggu transmisi data...</li>
    </ul>
  </div>
</div>

<script>
let stream = null;
let animId = null;
let detecting = false;
let detectionCooldown = false;
let totalDetections = 0;
let frameCount = 0;
let lastFpsTime = performance.now();

const video   = document.getElementById('videoEl');
const canvas  = document.getElementById('canvasEl');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });
const scanline= document.getElementById('scanline');
const dot     = document.getElementById('statusDot');
const statusT = document.getElementById('statusText');
const logList = document.getElementById('logList');
const emptyLog= document.getElementById('emptyLog');
const meterF  = document.getElementById('meterFill');
const meterV  = document.getElementById('meterVal');
const fpsEl   = document.getElementById('fpsCounter');
const btnStart= document.getElementById('btnStart');
const btnStop = document.getElementById('btnStop');
const placeholder = document.getElementById('placeholder');
const lgOverlay   = document.getElementById('lgOverlay');

const sensSlider = document.getElementById('sensSlider');
const sensVal = document.getElementById('sensVal');
const greenToggle = document.getElementById('greenToggle');

sensSlider.addEventListener('input', (e) => {
  sensVal.textContent = e.target.value + '%';
});

async function startCamera() {
  try {
    statusT.textContent = 'Menghubungkan ke sensor video...';
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
    });
  } catch(e) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    } catch(err) {
      statusT.textContent = 'Kamera Gagal: ' + err.message;
      return;
    }
  }

  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);

  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;

  placeholder.style.display = 'none';
  video.style.display = 'block';
  canvas.style.display = 'block';
  scanline.classList.add('active');
  dot.className = 'status-dot live';
  statusT.textContent = 'Sistem Siap — Arahkan Remote LG / TV Anda';
  btnStart.disabled = true;
  btnStop.disabled  = false;

  detecting = true;
  loop();
}

function stopCamera() {
  detecting = false;
  if (animId) cancelAnimationFrame(animId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;

  video.style.display   = 'none';
  canvas.style.display  = 'none';
  placeholder.style.display = 'flex';
  scanline.classList.remove('active');
  dot.className  = 'status-dot';
  statusT.textContent = 'Sistem Offline';
  fpsEl.textContent   = '';
  btnStart.disabled   = false;
  btnStop.disabled    = true;
  meterF.style.width  = '0%';
  meterV.textContent  = '0%';
}

function loop() {
  if (!detecting) return;
  animId = requestAnimationFrame(loop);

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime > 1000) {
    fpsEl.textContent = frameCount + ' fps';
    frameCount = 0;
    lastFpsTime = now;
  }

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  analyzeFrame(frame);
}

function analyzeFrame(frame) {
  const data = frame.data;
  const len  = data.length;

  const sensValue = parseInt(sensSlider.value);
  const isGreenScreen = greenToggle.checked;

  // Rumus kalibrasi sensitivitas lensa manual
  const minBrightness = 255 - (sensValue * 1.8); 
  const minDominance = 90 - (sensValue * 0.7);   

  // Kecepatan membaca: Green screen memproses pixel penuh, mode normal memakai teknik lompat piksel (lebih hemat daya)
  const step = isGreenScreen ? 4 : 16;
  let irSum = 0, sampleCount = 0;

  for (let i = 0; i < len; i += step) {
    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];

    const brightness = (r + g + b) / 3;
    const rDominance = r - (g + b) / 2;
    
    let isIr = false;
    if (brightness > minBrightness && rDominance > minDominance) {
      // Bobot kekuatan piksel cahaya
      irSum += rDominance * (brightness / 255);
      isIr = true;
    }

    if (isGreenScreen) {
      if (isIr) {
        // Efek Peningkatan Green Screen: Tembakan Hijau Neon Murni pada pusat cahaya IR
        data[i]   = 0;   
        data[i+1] = 255; 
        data[i+2] = 136; 
      } else {
        // Latar Belakang Digital Gelap (Isolasi Kontras Tinggi)
        const v = brightness * 0.15; // Mengubah video asli menjadi abu-abu super gelap
        data[i]   = v * 0.2;            
        data[i+1] = v; // Sedikit dominan hijau matriks         
        data[i+2] = v * 0.3;   
      }
    }
    sampleCount++;
  }

  if (isGreenScreen) {
    ctx.putImageData(frame, 0, 0);
  }

  const baseAvg = (irSum / sampleCount);
  const multiplier = isGreenScreen ? 25 : 6;
  const irLevel = Math.min(100, baseAvg * multiplier);

  const displayLevel = Math.round(irLevel);
  meterF.style.width = displayLevel + '%';
  meterV.textContent = displayLevel + '%';

  // Trigger jika sinyal melampaui batas ambang deteksi
  if (irLevel > 10 && !detectionCooldown) {
    triggerDetection(irLevel);
  }
}

function triggerDetection(level) {
  detectionCooldown = true;
  totalDetections++;

  // Memicu Animasi Monitor Teks LG "Life's Good"
  lgOverlay.classList.remove('active');
  void lgOverlay.offsetWidth; // Trik memicu ulang animasi CSS (Reflow)
  lgOverlay.classList.add('active');

  dot.className = 'status-dot detect';
  statusT.textContent = `⚡ TRANSMISI LG IR DETEKSI! (#${totalDetections})`;
  
  setTimeout(() => {
    dot.className = 'status-dot live';
    statusT.textContent = 'Sistem Siap — Arahkan Remote LG / TV Anda';
  }, 1200);

  addLogEntry(level);
  setTimeout(() => detectionCooldown = false, 700); // Jeda cooldown pencegah spam log
}

function addLogEntry(level) {
  if (emptyLog) emptyLog.remove();

  const now  = new Date();
  const ts   = now.toTimeString().slice(0,8);
  const pct  = Math.min(100, Math.round(level)).toString().padStart(3,' ');
  const strength = level > 50 ? 'SANGAT KUAT' : level > 25 ? 'NORMAL' : 'LEMAH';

  const li = document.createElement('li');
  li.className = 'log-item';
  li.innerHTML = `
    <div class="dot"></div>
    <span class="ts">${ts}</span>
    <span class="label">📡 LG Data Stream #${totalDetections}</span>
    <span class="strength">${strength} (${pct}%)</span>
  `;
  logList.insertBefore(li, logList.firstChild);

  while (logList.children.length > 20) {
    logList.removeChild(logList.lastChild);
  }
}

function clearLog() {
  logList.innerHTML = '<li class="empty-log" id="emptyLog">Menunggu transmisi data...</li>';
  totalDetections = 0;
}

window.addEventListener('beforeunload', stopCamera);
</script>

</body>
</html>
