<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester Remote IR - Pro Mode</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 {
            color: #00e676;
            margin-bottom: 5px;
        }
        
        /* Panel Pengaturan */
        .control-panel {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin: 15px auto;
            max-width: 400px;
            text-align: left;
            box-sizing: border-box;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: inline-block;
            width: 140px;
            font-size: 13px;
            font-weight: bold;
        }
        .control-group input {
            width: 150px;
            vertical-align: middle;
        }

        /* Container Monitor & Indikator */
        .box-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px auto;
            max-width: 400px;
        }

        /* Monitor Mini Preview */
        .monitor-box {
            position: relative;
            width: 120px;
            height: 90px;
            background-color: #000;
            border: 2px solid #555;
            border-radius: 6px;
            overflow: hidden;
        }
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .monitor-label {
            position: absolute;
            bottom: 2px;
            left: 2px;
            background: rgba(0,0,0,0.7);
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            color: #00e676;
        }

        /* Gaya Indikator */
        #indicator {
            width: 100px;
            height: 100px;
            background-color: #b71c1c;
            border-radius: 50%;
            border: 5px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: background-color 0.05s, box-shadow 0.05s;
        }
        #indicator.active {
            background-color: #00e676;
            border-color: #fff;
            box-shadow: 0 0 30px #00e676, 0 0 10px #fff;
        }
        
        #statusText {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            color: #aaa;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
            background-color: #00e676;
            color: #121212;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        button:hover {
            background-color: #00b55d;
            transform: scale(1.02);
        }
        
        /* Canvas tersembunyi untuk processing data */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <h2>Tester Remote IR (Pro Mode)</h2>
    <p style="margin: 0; color: #888; font-size: 13px;">Fitur: Audio Bip + Getar HP + Monitor Kamera</p>

    <!-- Kotak Monitor & Indikator Sejajar -->
    <div class="box-container">
        <!-- Monitor Kecil -->
        <div class="monitor-box">
            <video id="videoElement" autoplay playsinline muted></video>
            <div class="monitor-label" id="monitorLabel">OFF</div>
        </div>
        
        <!-- Lingkaran Indikator -->
        <div id="indicator"></div>
    </div>

    <div id="statusText">Sistem Siap...</div>

    <button id="startBtn">Mulai Deteksi</button>
    <button id="switchBtn" style="display: none;">Ganti Kamera</button>

    <!-- Panel Kalibrasi Kepekaan -->
    <div class="control-panel">
        <div class="control-group">
            <label for="brightnessRange">Peka Cahaya: <span id="brightVal">120</span></label>
            <input type="range" id="brightnessRange" min="50" max="230" value="120">
            <div style="color: #888; font-size: 11px; margin-left: 140px;">Makin kecil angka = makin super peka</div>
        </div>
        <div class="control-group">
            <label for="pixelRange">Sensitivitas Titik: <span id="pixelVal">0.001</span>%</label>
            <input type="range" id="pixelRange" min="1" max="50" value="1">
            <div style="color: #888; font-size: 11px; margin-left: 140px;">Angka 1 = mendeteksi titik led sekecil apa pun</div>
        </div>
    </div>

    <canvas id="canvasElement"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');
        const indicator = document.getElementById('indicator');
        const statusText = document.getElementById('statusText');
        const monitorLabel = document.getElementById('monitorLabel');
        
        const brightnessRange = document.getElementById('brightnessRange');
        const pixelRange = document.getElementById('pixelRange');
        const brightVal = document.getElementById('brightVal');
        const pixelVal = document.getElementById('pixelVal');

        let currentStream = null;
        let useFrontCamera = true; 
        let isDetecting = false;
        
        let audioCtx = null;
        let lastActionTime = 0;

        brightnessRange.addEventListener('input', () => brightVal.innerText = brightnessRange.value);
        pixelRange.addEventListener('input', () => pixelVal.innerText = (pixelRange.value / 1000).toFixed(3));

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Fungsi pemicu Audio (Bip) dan Getar (Vibrate) secara bersamaan
        function triggerFeedback() {
            const nowTime = Date.now();
            // Batasi umpan balik maksimal setiap 100ms agar responsif tapi tidak berlebihan
            if (nowTime - lastActionTime < 100) return;
            lastActionTime = nowTime;

            // 1. Jalankan Fitur Getar (Vibrator)
            if (navigator.vibrate) {
                navigator.vibrate(50); // Getar pendek selama 50 milidetik
            }

            // 2. Jalankan Fitur Suara (Web Audio API)
            if (audioCtx) {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now); // Frekuensi agak tinggi agar jelas terdengar
                
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.06); // Mati cepat dalam 0.06 detik
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.06);
            }
        }

        function analyzeFrame() {
            if (!isDetecting || video.readyState !== video.HAVE_ENOUGH_DATA) return;
            
            // Ukuran canvas kecil untuk kecepatan processing data piksel tinggi
            canvas.width = 120; 
            canvas.height = 90;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const brightnessThreshold = parseInt(brightnessRange.value);
            const percentageThreshold = parseFloat(pixelRange.value) / 1000; 
            
            let brightPixelCount = 0;
            const totalPixels = data.length / 4;
            
            // Scan piksel secara rapat (loncat per 8 komponen data/2 piksel agar lebih presisi)
            for (let i = 0; i < data.length; i += 8) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // Kalkulasi kecerahan piksel
                const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                
                if (brightness > brightnessThreshold) {
                    brightPixelCount++;
                }
            }
            
            const currentPercentage = (brightPixelCount / totalPixels) * 100;
            
            if (currentPercentage > percentageThreshold) {
                if (!indicator.classList.contains('active')) {
                    indicator.classList.add('active');
                    statusText.innerText = "SINAYAL MASUK!";
                    statusText.style.color = "#00e676";
                }
                triggerFeedback(); 
            } else {
                indicator.classList.remove('active');
                statusText.innerText = "Mencari Sinyal...";
                statusText.style.color = "#aaa";
            }
            
            requestAnimationFrame(analyzeFrame);
        }

        async function startCamera() {
            initAudio(); 
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { facingMode: useFrontCamera ? "user" : "environment" }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                
                startBtn.style.display = "none";
                switchBtn.style.display = "inline-block";
                monitorLabel.innerText = useFrontCamera ? "DEPAN" : "BELAKANG";
                
                isDetecting = true;
                analyzeFrame();
            } catch (err) {
                console.error(err);
                statusText.innerText = "Akses Kamera Gagal!";
                alert("Gagal memuat kamera. Pastikan Anda membuka link menggunakan protokol HTTPS.");
            }
        }

        startBtn.addEventListener('click', startCamera);
        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });
    </script>
</body>
</html>
